# カテゴリ定義。
#
# - id は dictionary/ 配下のファイル名(拡張子を除く)と1対1で対応する。
#   例: id: aws → dictionary/aws.yaml のレコードは全て category: aws を持つ。
# - id はケバブケースではなくスネークケースで統一する(ファイル名と完全一致させるため)。
# - 新しいカテゴリを追加する場合は、ここに定義を追加したうえで
#   dictionary/<id>.yaml を新規作成すること。
